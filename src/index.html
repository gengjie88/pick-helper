<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PickHelper</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 标题栏 -->
  <div class="titlebar">
    <div class="titlebar-title">PickHelper</div>
    <div class="titlebar-actions">
      <button class="titlebar-btn" id="settingsBtn" title="设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <button class="titlebar-btn" id="minimizeBtn" title="最小化">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button class="titlebar-btn close" id="closeBtn" title="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="content">
    <!-- 状态卡片 -->
    <div class="status-card">
      <div class="status-row">
        <span class="status-label">客户端状态</span>
        <span class="status-value disconnected" id="connectionStatus">
          <span class="status-dot disconnected"></span>
          未连接
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">游戏阶段</span>
        <span class="status-value" id="gamePhase">-</span>
      </div>
    </div>

    <!-- 英雄优先级列表 -->
    <div class="hero-section">
      <div class="section-header">
        <span class="section-title">预选英雄优先级</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <select id="presetSelect" style="padding:6px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;"></select>
            <span class="update-time" id="updateTime">数据更新: -</span>
          </div>
      </div>
      <div class="hero-list" id="heroList">
        <div class="empty-state">加载中...</div>
      </div>
    </div>
  </div>

  <script src="js/renderer.js"></script>
</body>
</html>
