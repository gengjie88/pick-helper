<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="innerBg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1e3a5f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="32" y="32" width="448" height="448" rx="112" ry="112" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- 内圈 -->
  <circle cx="256" cy="240" r="160" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- 闪电/光标图标 -->
  <g transform="translate(256,240)">
    <path d="M-20,-130 L60,-30 L10,-30 L50,130 L-50,20 L0,20 Z"
          fill="url(#bolt)" stroke="rgba(0,0,0,0.1)" stroke-width="3"
          stroke-linejoin="round"/>
  </g>

  <!-- 底部文字 -->
  <text x="256" y="428" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="60" font-weight="900"
        fill="rgba(255,255,255,0.12)" letter-spacing="8">PH</text>
</svg>
